<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TuZy Kırtasiye ve Oyuncak - Erenler Sakarya'da en renkli okul malzemeleri, lisanslı oyuncaklar. Kapıya teslimat!">
    <meta name="keywords" content="kırtasiye, oyuncak, okul malzemeleri, Erenler, Sakarya, TuZy, renkli, eğlenceli">
    <meta name="theme-color" content="#ff6b6b">
    <title>🌈 TuZy Kırtasiye Oyuncak | Erenler Sakarya</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ============================================
           TUM SIFIRLAMA VE GENEL STILLER
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: #fff8f0;
            color: #2d3436;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ============================================
           ANIMASYONLAR
           ============================================ */
        @keyframes zipla {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes don {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes yuzme {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-20px) rotate(3deg); }
        }

        @keyframes nabiz {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.6); }
            70% { box-shadow: 0 0 0 25px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        @keyframes kay {
            from { transform: translateX(100%); }
            to { transform: translateX(-100%); }
        }

        @keyframes isilti {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes buyu {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes renkDegis {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes yildizKay {
            0% { transform: translateX(-100px) translateY(-100px); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateX(calc(100vw + 100px)) translateY(calc(100vh + 100px)); opacity: 0; }
        }

        @keyframes balon {
            0% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-30px) rotate(5deg); }
            50% { transform: translateY(-10px) rotate(-3deg); }
            75% { transform: translateY(-40px) rotate(7deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }

        @keyframes salla {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            75% { transform: rotate(10deg); }
        }

        /* ============================================
           YILDIZ YAGMURU ARKAPLAN
           ============================================ */
        .yildizlar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .yildiz {
            position: absolute;
            font-size: 20px;
            animation: yildizKay 8s linear infinite;
            opacity: 0;
        }

        .yildiz:nth-child(1) { left: 10%; animation-delay: 0s; }
        .yildiz:nth-child(2) { left: 30%; animation-delay: 2s; font-size: 25px; }
        .yildiz:nth-child(3) { left: 50%; animation-delay: 4s; font-size: 18px; }
        .yildiz:nth-child(4) { left: 70%; animation-delay: 1s; font-size: 28px; }
        .yildiz:nth-child(5) { left: 90%; animation-delay: 5s; font-size: 22px; }
        .yildiz:nth-child(6) { left: 20%; animation-delay: 3s; font-size: 16px; }
        .yildiz:nth-child(7) { left: 60%; animation-delay: 6s; font-size: 30px; }
        .yildiz:nth-child(8) { left: 80%; animation-delay: 7s; font-size: 24px; }

        /* ============================================
           UST BAR - GOKKUSAGI
           ============================================ */
        .top-bar {
            background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #a66cff, #ff6b6b);
            background-size: 300% 100%;
            animation: renkDegis 8s ease infinite;
            color: white;
            padding: 10px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            flex-wrap: wrap;
            gap: 10px;
            font-weight: 600;
            position: relative;
            z-index: 1001;
        }

        .top-bar .sol i {
            animation: zipla 1s ease-in-out infinite;
            margin-right: 6px;
        }

        .top-bar .sag {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .top-bar .sag a {
            color: white;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            white-space: nowrap;
        }

        .top-bar .sag a:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(1.08);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* ============================================
           NAVIGASYON
           ============================================ */
        nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 35px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
            gap: 15px;
            border-radius: 0 0 30px 30px;
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .logo .logo-ikon {
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            animation: don 4s linear infinite;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .logo .kirmizi {
            color: #ff6b6b;
        }

        .logo .mavi {
            color: #4d96ff;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: #555;
            font-weight: 700;
            font-size: 13px;
            padding: 10px 18px;
            border-radius: 25px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .nav-links a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,107,107,0.2), transparent);
            transition: 0.5s;
        }

        .nav-links a:hover::before {
            left: 100%;
        }

        .nav-links a:hover,
        .nav-links a.active {
            background: #fff0f0;
            color: #ff6b6b;
            transform: translateY(-2px);
        }

        .nav-btn {
            background: linear-gradient(135deg, #ff6b6b, #ff4757);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
            white-space: nowrap;
            animation: buyu 2s ease-in-out infinite;
        }

        .nav-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(255, 107, 107, 0.6);
            background: linear-gradient(135deg, #ff4757, #ff6b6b);
        }

        /* ============================================
           HERO BOLUMU
           ============================================ */
        .hero {
            background: linear-gradient(135deg, #ff6b6b 0%, #ffd93d 20%, #6bcb77 40%, #4d96ff 60%, #a66cff 80%, #ff6b6b 100%);
            background-size: 400% 400%;
            animation: renkDegis 10s ease infinite;
            color: white;
            padding: 100px 5%;
            text-align: center;
            position: relative;
            overflow: hidden;
            min-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            z-index: 0;
        }

        .hero::after {
            content: '⭐ 🎈 🎨 🚗 🧸 🎪 🎯 🎲 🎭 🎪 ⭐ 🎈 🎨 🚗 🧸 🎪 🎯 🎲';
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            font-size: 28px;
            animation: kay 20s linear infinite;
            white-space: nowrap;
            letter-spacing: 30px;
            opacity: 0.5;
            z-index: 0;
        }

        .hero-ic {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero-etiket {
            display: inline-block;
            background: rgba(255, 255, 255, 0.25);
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: isilti 2s ease-in-out infinite;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .hero h1 {
            font-size: 52px;
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 20px;
            text-shadow: 4px 4px 0 rgba(0, 0, 0, 0.15);
            letter-spacing: -1px;
        }

        .hero h1 .emoji {
            display: inline-block;
            animation: salla 0.5s ease-in-out infinite;
        }

        .hero p {
            font-size: 18px;
            opacity: 0.95;
            margin-bottom: 40px;
            line-height: 1.8;
            font-weight: 500;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .hero-btnlar {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-birincil {
            background: white;
            color: #ff6b6b;
            padding: 18px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            font-size: 16px;
            transition: all 0.4s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn-birincil::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,107,107,0.3) 0%, transparent 60%);
            animation: don 8s linear infinite;
        }

        .btn-birincil:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            color: #ff4757;
        }

        .btn-ikincil {
            background: transparent;
            color: white;
            padding: 18px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            font-size: 16px;
            border: 3px solid white;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(5px);
        }

        .btn-ikincil:hover {
            background: white;
            color: #ff6b6b;
            transform: translateY(-6px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        /* ============================================
           OZELLIKLER BOLUMU
           ============================================ */
        .ozellikler {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 50px 5%;
            flex-wrap: wrap;
            background: white;
            position: relative;
            z-index: 1;
        }

        .ozellik {
            text-align: center;
            min-width: 120px;
            flex: 1;
            max-width: 170px;
            padding: 25px 15px;
            border-radius: 25px;
            transition: all 0.4s ease;
            cursor: default;
        }

        .ozellik:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .ozellik:nth-child(1):hover { background: #fff5f5; }
        .ozellik:nth-child(2):hover { background: #fffef5; }
        .ozellik:nth-child(3):hover { background: #f5fff5; }
        .ozellik:nth-child(4):hover { background: #f5f8ff; }
        .ozellik:nth-child(5):hover { background: #faf5ff; }

        .ozellik-ikon {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 35px;
            transition: 0.4s;
        }

        .ozellik:hover .ozellik-ikon {
            animation: zipla 0.6s ease-in-out;
        }

        .ozellik:nth-child(1) .ozellik-ikon { background: #fff0f0; color: #ff6b6b; }
        .ozellik:nth-child(2) .ozellik-ikon { background: #fffef0; color: #ffd93d; }
        .ozellik:nth-child(3) .ozellik-ikon { background: #f0fff4; color: #6bcb77; }
        .ozellik:nth-child(4) .ozellik-ikon { background: #f0f6ff; color: #4d96ff; }
        .ozellik:nth-child(5) .ozellik-ikon { background: #f8f0ff; color: #a66cff; }

        .ozellik strong {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
            color: #2d3436;
        }

        .ozellik span {
            font-size: 11px;
            color: #888;
            font-weight: 500;
        }

        /* ============================================
           KATEGORI KUTULARI
           ============================================ */
        .kategoriler {
            padding: 80px 5%;
            text-align: center;
            background: #fff8f0;
            position: relative;
            z-index: 1;
        }

        .bolum-baslik {
            font-size: 40px;
            font-weight: 900;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #a66cff);
            background-size: 300% 300%;
            animation: renkDegis 5s ease infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .bolum-alt {
            color: #888;
            font-size: 16px;
            margin-bottom: 60px;
            font-weight: 500;
        }

        .kutu-container {
            display: flex;
            flex-wrap: wrap;
            gap: 35px;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .kutu {
            flex: 1;
            min-width: 320px;
            max-width: 520px;
            height: 420px;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.2);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .kutu::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
            transition: all 0.6s ease;
        }

        .kutu:hover::before {
            background: rgba(0, 0, 0, 0.15);
        }

        .kutu:hover {
            transform: translateY(-20px) scale(1.03);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.3);
        }

        .kutu.kirtasiye {
            background: linear-gradient(135deg, #ff6b6b, #ffd93d, #ff4757);
            background-size: 300% 300%;
            animation: renkDegis 8s ease infinite;
        }

        .kutu.oyuncak {
            background: linear-gradient(135deg, #4d96ff, #6bcb77, #a66cff);
            background-size: 300% 300%;
            animation: renkDegis 8s ease infinite reverse;
        }

        .kutu-ic {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .kutu-ikon {
            font-size: 90px;
            margin-bottom: 25px;
            animation: yuzme 3s ease-in-out infinite;
            display: inline-block;
            filter: drop-shadow(3px 3px 5px rgba(0,0,0,0.3));
        }

        .kutu-baslik {
            font-size: 40px;
            font-weight: 900;
            margin-bottom: 10px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
            letter-spacing: -1px;
        }

        .kutu-alt {
            font-size: 17px;
            opacity: 0.95;
            font-weight: 500;
            margin-bottom: 30px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }

        .kutu-btn {
            background: white;
            padding: 16px 45px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 16px;
            display: inline-block;
            transition: all 0.4s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .kutu.kirtasiye .kutu-btn { color: #ff6b6b; }
        .kutu.oyuncak .kutu-btn { color: #4d96ff; }

        .kutu:hover .kutu-btn {
            box-shadow: 0 15px 40px rgb
