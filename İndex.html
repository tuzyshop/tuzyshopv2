<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuZy Kirtasiye ve Oyuncak | Erenler Sakarya</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: #fff5f5;
            color: #2d3436;
            line-height: 1.7;
            overflow-x: hidden;
        }

        @keyframes don {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes zipla {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes nabiz {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.6); }
            70% { box-shadow: 0 0 0 25px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        @keyframes kay {
            from { transform: translateX(100%); }
            to { transform: translateX(-100%); }
        }

        @keyframes renkDegis {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes yuzme {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-18px) rotate(2deg); }
        }

        @keyframes yildizKay {
            0% { transform: translateX(-50px) translateY(-50px); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateX(calc(100vw + 50px)) translateY(calc(100vh + 50px)); opacity: 0; }
        }

        @keyframes salla {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-8deg); }
            75% { transform: rotate(8deg); }
        }

        @keyframes buyuKucul {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }

        @keyframes isilti {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .yildizlar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .yildiz {
            position: absolute;
            font-size: 18px;
            animation: yildizKay 10s linear infinite;
            opacity: 0;
        }

        .yildiz:nth-child(1) { left: 5%; animation-delay: 0s; }
        .yildiz:nth-child(2) { left: 20%; animation-delay: 2s; font-size: 22px; }
        .yildiz:nth-child(3) { left: 35%; animation-delay: 4s; font-size: 16px; }
        .yildiz:nth-child(4) { left: 50%; animation-delay: 1s; font-size: 24px; }
        .yildiz:nth-child(5) { left: 65%; animation-delay: 5s; font-size: 20px; }
        .yildiz:nth-child(6) { left: 80%; animation-delay: 3s; font-size: 28px; }
        .yildiz:nth-child(7) { left: 90%; animation-delay: 6s; font-size: 22px; }
        .yildiz:nth-child(8) { left: 45%; animation-delay: 7s; font-size: 26px; }

        .top-bar {
            background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #a66cff, #ff6b6b);
            background-size: 300% 100%;
            animation: renkDegis 10s ease infinite;
            color: white;
            padding: 12px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            flex-wrap: wrap;
            gap: 10px;
            font-weight: 600;
            position: relative;
            z-index: 1001;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .top-bar .sol i {
            animation: zipla 1.2s ease-in-out infinite;
            margin-right: 8px;
        }

        .top-bar .sag {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .top-bar .sag a {
            color: white;
            text-decoration: none;
            background: rgba(255,255,255,0.2);
            padding: 7px 16px;
            border-radius: 25px;
            font-size: 11px;
            font-weight: 600;
            transition: 0.3s;
            backdrop-filter: blur(5px);
            white-space: nowrap;
        }

        .top-bar .sag a:hover {
            background: rgba(255,255,255,0.5);
            transform: scale(1.08);
        }

        nav {
            background: white;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
            gap: 15px;
            border-radius: 0 0 35px 35px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            transition: 0.3s;
        }

        .logo:hover {
            transform: scale(1.04);

        .logo-ikon {

            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: white;
            animation: don 4s linear infinite;
            box-shadow: 0 6px 18px rgba(255,107,107,0.4);
        }

        .logo .kirmizi {
            font-size: 26px;
            font-weight: 900;
            color: #ff6b6b;
        }

        .logo .mavi {
            font-size: 26px;
            font-weight: 900;
            color: #4d96ff;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .nav-link {
            text-decoration: none;
            color: #555;
            font-weight: 700;
            font-size: 13px;
            padding: 10px 18px;
            border-radius: 25px;
            transition: 0.3s;
        }

        .nav-link:hover,
        .nav-link.active {
            background: #fff0f0;
            color: #ff6b6b;
        }

        .nav-btn {
            background: linear-gradient(135deg, #ff6b6b, #ff4757);
            color: white;
            border: none;
            padding: 13px 28px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 14px;

        }

        .nav-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 32px rgba(255,107,107,0.6);
        }

        .hero {
            background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #a66cff);

            bottom: 25px;
            left: 0;
            width: 100%;
            font-size: 26px;

            opacity: 0.5;

        .hero-ic {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero-etiket {
            display: inline-block;
            background: rgba(255,255,255,0.25);
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 25px;

            border: 2px solid rgba(255,255,255,0.3);

        .hero h1 {

        .hero p {

        .hero-btnlar {
            display: flex;

            flex-wrap: wrap;
        }

        .btn-birincil {
            background: white;
            color: #ff6b6b;
            padding: 17px 38px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            font-size: 16px;
            transition: 0.4s;
            box-shadow: 0 10px 28px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-birincil:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 45px rgba(0,0,0,0.3);

        .btn-ikincil {
            background: transparent;

        }

        .btn-ikincil:hover {
            background: white;

            box-shadow: 0 18px 45px rgba(0,0,0,0.3);

        .ozellikler {
            display: flex;
            justify-content: center;
            gap: 28px;
            padding: 50px 5%;

            background: white;

        .ozellik {
            text-align: center;

            flex: 1;
            max-width: 160px;
            padding: 24px 14px;
            border-radius: 28px;

        .ozellik:hover {
            transform: translateY(-10px);
            box-shadow: 0 18px 35px rgba(0,0,0,0.1);
        }

        .ozellik-ikon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: flex;
            align-items: center;

        }

        .ozellik:hover .ozellik-ikon {
            animation: zipla 0.6s ease-in-out;
        }

        .ozellik:nth-child(1) .ozellik-ikon { background: #fff0f0; color: #ff6b6b; }
        .ozellik:nth-child(2) .ozellik-ikon { background: #fffef0; color: #ffd93d; }
        .ozellik:nth-child(3) .ozellik-ikon { background: #f0fff4; color: #6bcb77; }
        .ozellik:nth-child(4) .ozellik-ikon { background: #f0f6ff; color: #4d96ff; }
        .ozellik:nth-child(5) .ozellik-ikon { background: #f8f0ff; color: #a66cff; }

        .ozellik strong {

        .bolum-baslik {
            font-size: 38px;

            margin-bottom: 12px;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #a66cff);
            background-size: 300% 300%;
            animation: renkDegis 6s ease infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .bolum-alt {
            color: #888;
            font-size: 16px;
            margin-bottom: 55px;
            font-weight: 500;

        .kutu-container {
            display: flex;
            flex-wrap: wrap;
            gap: 35px;
            justify-content: center;
            max-width: 1150px;
            margin: 0 auto;
        }

        .kutu {
            flex: 1;
            min-width: 310px;
            max-width: 500px;
            height: 400px;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 22px 55px rgba(0,0,0,0.2);
            transition: 0.6s;
        }

        .kutu::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 1;
            transition: 0.6s;
        }

        .kutu:hover::before {
            background: rgba(0,0,0,0.12);
        }

        .kutu:hover {
            transform: translateY(-18px) scale(1.03);
            box-shadow: 0 35px 70px rgba(0,0,0,0.3);
        }

        .kutu.kirtasiye {
            background: linear-gradient(135deg, #ff6b6b, #ffd93d, #ff4757);
            background-size: 300% 300%;
            animation: renkDegis 10s ease infinite;
        }

        .kutu.oyuncak {
            background: linear-gradient(135deg, #4d96ff, #6bcb77, #a66cff);
            background-size: 300% 300%;
            animation: renkDegis 10s ease infinite reverse;
        }

        .kutu-ic {
            position: relative;
            z-index: 2;
            text-align: center;

        .kutu-ikon {

            margin-bottom: 22px;

            filter: drop-shadow(3px 3px 6px rgba(0,0,0,0.3));

        .kutu-baslik {
            font-size: 38px;
            font-weight: 900;
            margin-bottom: 8px;

        .kutu-alt {

        .kutu-btn {

            font-weight: 800;
            font-size: 15px;
            display: inline-block;

        .kutu.kirtasiye .kutu-btn { color: #ff6b6b; }
        .kutu.oyuncak .kutu-btn { color: #4d96ff; }
        .kutu:hover .kutu-btn { box-shadow: 0 12px 35px rgba(255,255,255,0.5); transform: scale(1.1); }
